# =================================================================
# Society Management System - Application Properties
# =================================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# =================================================================
# Database Configuration (PostgreSQL)
# =================================================================
spring.datasource.url=jdbc:postgresql://ep-mute-flower-atffqrwp-pooler.c-9.us-east-1.aws.neon.tech/society_management?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD:npg_pU1MhFuVe4rQ}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# spring.jpa.hibernate.ddl-auto=create (duplicate removed)

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =================================================================
# JWT Configuration
# =================================================================
jwt.secret=${JWT_SECRET:myVerySecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2026}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# =================================================================
# SpringDoc / Swagger Configuration
# =================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.default-produces-media-type=application/json

# =================================================================
# CORS Configuration
# =================================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# =================================================================
# File Upload Configuration
# =================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =================================================================
# Logging
# =================================================================
logging.level.root=WARN
logging.level.com.society.management=INFO
logging.level.org.springframework.security=WARN

# =================================================================
# Actuator
# =================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
