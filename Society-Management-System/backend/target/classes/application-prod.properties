# =================================================================
# Society Management System - Production Profile
# =================================================================

# Disable Swagger in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Stricter logging
logging.level.root=WARN
logging.level.com.society.management=INFO
logging.level.org.springframework.security=WARN

# Disable SQL logging
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
spring.jpa.hibernate.ddl-auto=create

# Connection pool (tighter for prod)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Production CORS — set to your real frontend domain
app.cors.allowed-origins=${FRONTEND_URL:https://your-society-app.com}

# Stricter actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
